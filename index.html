<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="dark"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Frequency Counter</title>
    <link rel="icon" href="data:,">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css" integrity="sha384-EIv1tRpD4TjJA0H6sAVfeiJJyJt6DwPxbTYWSsJzylRFMkqMI6xVARApOqqWm5iI" crossorigin="anonymous">

    <style>
        body {
        font-family: 'Inter', sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    /* === Premium polish (2026-05-14) === */
    body { position: relative; isolation: isolate; }
    body::before {
        content: '';
        position: fixed;
        inset: 0 0 auto 0;
        block-size: 32rem;
        background:
            radial-gradient(ellipse 70% 50% at 50% -5%,
                color-mix(in srgb, var(--crusher-color-brand-primary) 18%, transparent),
                transparent 65%);
        pointer-events: none;
        z-index: -1;
        opacity: 0.85;
    }
    ::selection { background: color-mix(in srgb, var(--crusher-color-brand-primary) 30%, transparent); }
    .crusher-tool-title {
        font-family: 'Fraunces', 'Georgia', serif;
        font-optical-sizing: auto;
        font-weight: 500;
        font-style: italic;
        font-size: clamp(2.25rem, 5vw, 3.5rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
    }
    .crusher-tool-control:focus-visible {
        border-color: var(--crusher-color-brand-primary);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--crusher-color-brand-primary) 18%, transparent);
        outline: none;
    }
    .crusher-tool-action {
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .crusher-tool-action:hover:not([disabled]) {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px -8px color-mix(in srgb, var(--crusher-color-brand-primary) 35%, transparent);
    }
    /* End premium polish */
    body.crusher-tool-page-marker { /* sentinel for re-runs */
    }
    /* End sentinel */
        .tool-mono { font-family: 'JetBrains Mono', monospace; }

        .tool-stack { display: grid; gap: var(--crusher-spacing-6); max-width: 42rem; margin-inline: auto; }
        .tool-section { padding: var(--crusher-spacing-6); display: grid; gap: var(--crusher-spacing-4); }
        .tool-label { display: block; margin-bottom: var(--crusher-spacing-1); font-size: var(--crusher-font-size-sm); color: var(--crusher-text-secondary); }
        .tool-action-row { display: flex; justify-content: center; }
        textarea.crusher-tool-control { min-block-size: 8rem; padding: var(--crusher-spacing-3); font-size: var(--crusher-font-size-sm); }
        .tool-action { padding-inline: var(--crusher-spacing-6); padding-block: var(--crusher-spacing-2); border-radius: var(--crusher-radius-full); font-weight: 600; }

        .tool-results {
            display: grid;
            gap: var(--crusher-spacing-1);
            padding: var(--crusher-spacing-3);
            min-block-size: 10rem;
            border-radius: var(--crusher-radius-lg);
            border: 1px solid var(--crusher-border-primary);
            background: var(--crusher-background-muted);
        }
        .tool-results-empty { color: var(--crusher-text-secondary); font-size: var(--crusher-font-size-sm); text-align: center; padding-block: var(--crusher-spacing-4); }
        .tool-result-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-block: var(--crusher-spacing-2);
            border-bottom: 1px solid var(--crusher-border-primary);
        }
        .tool-result-row:last-child { border-bottom: 0; }
        .tool-result-word { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--crusher-color-brand-primary); }
        .tool-result-count { color: var(--crusher-text-secondary); font-size: var(--crusher-font-size-sm); }

        .tool-feedback {
            width: min(100%, 56rem);
            margin: var(--crusher-spacing-8) auto var(--crusher-spacing-6);
            padding-inline: var(--crusher-spacing-4);
        }
        .tool-feedback-trigger {
            cursor: pointer;
            padding: var(--crusher-spacing-2) var(--crusher-spacing-3);
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-text-secondary);
            border-radius: var(--crusher-radius-md);
            list-style: none;
            display: inline-flex;
            align-items: center;
            gap: var(--crusher-spacing-2);
            transition: color var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
        .tool-feedback-trigger::-webkit-details-marker { display: none; }
        .tool-feedback-trigger::before {
            content: '+';
            display: inline-block;
            font-weight: 700;
            color: var(--crusher-color-brand-primary);
        }
        .tool-feedback-details[open] .tool-feedback-trigger::before { content: '−'; }
        .tool-feedback-trigger:hover { color: var(--crusher-color-brand-primary); }
        .tool-feedback-form {
            margin-top: var(--crusher-spacing-3);
            padding: var(--crusher-spacing-4);
            border: 1px solid var(--crusher-border-primary);
            border-radius: var(--crusher-radius-lg);
            background: var(--crusher-background-surface);
            display: grid;
            gap: var(--crusher-spacing-3);
        }
        .tool-feedback-field { display: grid; gap: var(--crusher-spacing-1); }
        .tool-feedback-field > span {
            font-size: var(--crusher-font-size-xs);
            color: var(--crusher-text-secondary);
            font-weight: 500;
        }
        .tool-feedback-submit {
            padding-inline: var(--crusher-spacing-4);
            padding-block: var(--crusher-spacing-2);
        }
        .tool-feedback-submit[disabled] { opacity: 0.6; cursor: not-allowed; }
        .tool-feedback-status {
            margin: 0;
            min-block-size: 1.25rem;
            font-size: var(--crusher-font-size-sm);
            color: var(--crusher-text-secondary);
        }
        .tool-feedback-status[data-kind="ok"] { color: var(--crusher-color-brand-primary); }
        .tool-feedback-status[data-kind="error"] { color: #dc2626; }
        .tool-feedback-honey { position: absolute; left: -9999px; top: -9999px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">Word Frequency Counter</h1>
            <p class="crusher-tool-lede">Analyze text to find most used words.</p>
        </header>

        <div class="tool-stack">
            <section class="crusher-tool-surface tool-section">
                <div>
                    <label for="input" class="tool-label">Input Text</label>
                    <textarea id="input" rows="6" class="crusher-tool-control tool-mono" placeholder="Enter text to analyze..."></textarea>
                </div>
                <div class="tool-action-row">
                    <button id="analyze-btn" type="button" class="crusher-tool-action tool-action">Analyze</button>
                </div>
                <div>
                    <label class="tool-label">Top Words</label>
                    <div id="results" class="tool-results"></div>
                </div>
            </section>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        const input = document.getElementById('input');
        const results = document.getElementById('results');
        const analyzeBtn = document.getElementById('analyze-btn');

        function renderEmpty() {
            results.replaceChildren();
            const empty = document.createElement('p');
            empty.className = 'tool-results-empty';
            empty.textContent = 'No words found';
            results.appendChild(empty);
        }

        function renderRows(entries) {
            results.replaceChildren();
            for (const [word, count] of entries) {
                const row = document.createElement('div');
                row.className = 'tool-result-row';
                const wordEl = document.createElement('span');
                wordEl.className = 'tool-result-word';
                wordEl.textContent = word;
                const countEl = document.createElement('span');
                countEl.className = 'tool-result-count';
                countEl.textContent = count;
                row.appendChild(wordEl);
                row.appendChild(countEl);
                results.appendChild(row);
            }
        }

        analyzeBtn.addEventListener('click', () => {
            const text = input.value.toLowerCase();
            const words = text.match(/\b[a-z]{2,}\b/g) || [];
            const freq = {};
            for (const w of words) freq[w] = (freq[w] || 0) + 1;
            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 10);
            if (sorted.length === 0) {
                renderEmpty();
            } else {
                renderRows(sorted);
            }
        });
    </script>

    <section class="tool-feedback" aria-label="Tool feedback">
        <details class="tool-feedback-details">
            <summary class="tool-feedback-trigger">Suggest an improvement</summary>
            <form id="tool-feedback-form" class="tool-feedback-form" novalidate>
                <label class="tool-feedback-field">
                    <span>What could be better?</span>
                    <textarea name="improvement" rows="3" required maxlength="2000" class="crusher-tool-control" placeholder="Tell me what's missing or what could work better…"></textarea>
                </label>
                <label class="tool-feedback-field">
                    <span>Your email (optional, only if you want a reply)</span>
                    <input type="email" name="replyto" maxlength="200" class="crusher-tool-control" placeholder="your@email.com">
                </label>
                <input type="text" name="botcheck" class="tool-feedback-honey" tabindex="-1" autocomplete="off" aria-hidden="true">
                <div>
                    <button type="submit" class="crusher-tool-action tool-feedback-submit">Send</button>
                </div>
                <p id="tool-feedback-status" class="tool-feedback-status" role="status" aria-live="polite"></p>
            </form>
        </details>
    </section>

    <script>
        (function() {
            const KEY = '30e570c5-aeeb-439d-8a8a-bd2516a5dc5d';
            const ENDPOINT = 'https://api.web3forms.com/submit';
            const form = document.getElementById('tool-feedback-form');
            const status = document.getElementById('tool-feedback-status');
            if (!form || !status) return;
            const toolName = (document.title || 'tool').trim();
            const subject = '[' + toolName + '] Improvement suggestion';
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const fd = new FormData(form);
                fd.set('access_key', KEY);
                fd.set('subject', subject);
                fd.set('from_name', toolName);
                const btn = form.querySelector('button[type="submit"]');
                const orig = btn.textContent;
                btn.disabled = true; btn.textContent = 'Sending…';
                status.textContent = ''; delete status.dataset.kind;
                try {
                    const res = await fetch(ENDPOINT, { method: 'POST', body: fd, headers: { 'Accept': 'application/json' } });
                    const data = await res.json();
                    if (data.success) {
                        form.reset();
                        status.textContent = 'Thanks — your suggestion is in.';
                        status.dataset.kind = 'ok';
                    } else {
                        status.textContent = data.message || 'Sorry, that did not go through. Try again later?';
                        status.dataset.kind = 'error';
                    }
                } catch (err) {
                    status.textContent = 'Network error. Try again?';
                    status.dataset.kind = 'error';
                } finally {
                    btn.disabled = false; btn.textContent = orig;
                }
            });
        })();
    </script>

</body>
</html>
